name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Download background images from Supabase
        run: |
          mkdir -p android/app/src/main/assets/mathlore-assets
          curl -L "https://mklrocckfuoymqvunsmr.supabase.co/storage/v1/object/public/mathlore-assets/bg-7.jpg" -o android/app/src/main/assets/mathlore-assets/bg-7.jpg
          curl -L "https://mklrocckfuoymqvunsmr.supabase.co/storage/v1/object/public/mathlore-assets/bg-8.jpg" -o android/app/src/main/assets/mathlore-assets/bg-8.jpg
          curl -L "https://mklrocckfuoymqvunsmr.supabase.co/storage/v1/object/public/mathlore-assets/bg-9.jpg" -o android/app/src/main/assets/mathlore-assets/bg-9.jpg

      - name: Copy static assets from repo
        run: |
          cp public/map.webp android/app/src/main/assets/mathlore-assets/map.webp
          cp public/bg-logic.jpg android/app/src/main/assets/mathlore-assets/bg-logic.jpg
          cp public/bg-triz.jpg android/app/src/main/assets/mathlore-assets/bg-triz.jpg

      - name: Generate app icons from source
        run: |
          pip3 install Pillow -q
          python3 - <<'EOF'
          from PIL import Image
          import os

          src = Image.open('android/icon-source.jpg').convert('RGBA')
          for density, size in [('mdpi',48),('hdpi',72),('xhdpi',96),('xxhdpi',144),('xxxhdpi',192)]:
              path = f'android/app/src/main/res/mipmap-{density}'
              os.makedirs(path, exist_ok=True)
              img = src.resize((size, size), Image.LANCZOS)
              img.save(f'{path}/ic_launcher.png')
              img.save(f'{path}/ic_launcher_round.png')
          print('Icons generated')
          EOF

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/archimath.jks

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_BASE64 != '' && '../android/archimath.jks' || '' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_ENABLED: ${{ secrets.KEYSTORE_BASE64 != '' && 'true' || 'false' }}
        run: |
          if [ "$SIGNING_ENABLED" = "true" ]; then
            gradle assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/archimath.jks \
              -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          else
            gradle assembleDebug
          fi

      - name: Upload Signed APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ArchiMath-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload Debug APK (fallback)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ArchiMath-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
