name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Download background images from Supabase
        run: |
          mkdir -p android/app/src/main/assets/mathlore-assets
          curl -L "https://mklrocckfuoymqvunsmr.supabase.co/storage/v1/object/public/mathlore-assets/bg-7.jpg" -o android/app/src/main/assets/mathlore-assets/bg-7.jpg
          curl -L "https://mklrocckfuoymqvunsmr.supabase.co/storage/v1/object/public/mathlore-assets/bg-8.jpg" -o android/app/src/main/assets/mathlore-assets/bg-8.jpg
          curl -L "https://mklrocckfuoymqvunsmr.supabase.co/storage/v1/object/public/mathlore-assets/bg-9.jpg" -o android/app/src/main/assets/mathlore-assets/bg-9.jpg

      - name: Generate placeholder app icons
        run: |
          for density_size in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${density_size%%:*}"
            size="${density_size##*:}"
            dir="android/app/src/main/res/mipmap-${density}"
            mkdir -p "$dir"
            convert -size ${size}x${size} xc:"#8b5e1a" \
              -fill white -gravity Center \
              -font DejaVu-Sans-Bold -pointsize $((size*2/5)) \
              -annotate 0 "A" \
              "$dir/ic_launcher.png"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
          done

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ArchiMath-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
