name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Download background images from Supabase
        run: |
          mkdir -p android/app/src/main/assets/mathlore-assets
          curl -L "https://mklrocckfuoymqvunsmr.supabase.co/storage/v1/object/public/mathlore-assets/bg-7.jpg" -o android/app/src/main/assets/mathlore-assets/bg-7.jpg
          curl -L "https://mklrocckfuoymqvunsmr.supabase.co/storage/v1/object/public/mathlore-assets/bg-8.jpg" -o android/app/src/main/assets/mathlore-assets/bg-8.jpg
          curl -L "https://mklrocckfuoymqvunsmr.supabase.co/storage/v1/object/public/mathlore-assets/bg-9.jpg" -o android/app/src/main/assets/mathlore-assets/bg-9.jpg

      - name: Copy static assets from repo
        run: cp public/map.webp android/app/src/main/assets/mathlore-assets/map.webp

      - name: Generate placeholder app icons
        run: |
          python3 - <<'EOF'
          import struct, zlib, os

          def make_png(size, r=0x8b, g=0x5e, b=0x1a):
              def chunk(name, data):
                  crc = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', crc)
              ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
              raw = b''.join(b'\x00' + bytes([r, g, b] * size) for _ in range(size))
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')

          for density, size in [('mdpi',48),('hdpi',72),('xhdpi',96),('xxhdpi',144),('xxxhdpi',192)]:
              path = f'android/app/src/main/res/mipmap-{density}'
              os.makedirs(path, exist_ok=True)
              data = make_png(size)
              open(f'{path}/ic_launcher.png', 'wb').write(data)
              open(f'{path}/ic_launcher_round.png', 'wb').write(data)
          print('Icons generated')
          EOF

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ArchiMath-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
