name: Generate Keystore (run once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore archimath.jks \
            -storetype JKS \
            -alias archimathkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass archimath2024 \
            -keypass archimath2024 \
            -dname "CN=ArchiMath, O=ArchiMath, C=RU"

      - name: Export as base64
        run: |
          base64 archimath.jks > keystore.b64
          echo ""
          echo "=== KEYSTORE_BASE64 (содержимое keystore.b64) ==="
          echo "=== KEY_ALIAS: archimathkey ==="
          echo "=== KEY_PASSWORD: archimath2024 ==="
          echo "=== STORE_PASSWORD: archimath2024 ==="

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore-base64
          path: keystore.b64
          retention-days: 1
