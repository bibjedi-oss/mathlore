<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>a³ − b³ — Разность кубов</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    #canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #label-wrap {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .dim-label {
      font-family: Georgia, serif;
      font-size: 14px;
      font-weight: 700;
      font-style: italic;
      background: rgba(13,13,26,0.72);
      border-radius: 4px;
      padding: 1px 6px;
      pointer-events: none;
      white-space: nowrap;
    }

    .piece-label {
      background: rgba(0,0,0,0.65);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,0.15);
    }

    /* ── Panel ── */
    #panel {
      width: 300px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.04);
      border-left: 1px solid rgba(255,255,255,0.08);
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    h1 sup { font-size: 14px; }
    .subtitle { color: #666; font-size: 12px; margin-top: 3px; }

    .formula-box {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
    }
    .formula-main { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .formula-parts { font-size: 14px; line-height: 1.7; }
    .formula-numeric { margin-top: 6px; font-size: 12px; color: #9888ff; }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555;
      margin-bottom: 6px;
    }

    .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .slider-name { width: 14px; font-weight: 700; font-size: 16px; color: #fff; }
    input[type=range] { flex: 1; accent-color: #7c6af7; cursor: pointer; height: 4px; }
    .slider-val { width: 28px; text-align: right; font-size: 14px; color: #ccc; }
    .constraint-hint { font-size: 11px; color: #555; margin-top: -4px; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      margin-bottom: 5px;
    }
    .legend-dot {
      width: 13px; height: 13px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .legend-dot.ghost {
      background: transparent !important;
      border: 2px dashed #ffe566;
    }
    .legend-term { flex: 1; font-size: 13px; font-weight: 600; }
    .legend-val  { font-size: 12px; color: #888; }

    .deriv-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.9;
      color: #aaa;
    }
    .deriv-box .hl { color: #fff; font-weight: 600; }
    .deriv-box .dc-bl { color: #4d9de0; }
    .deriv-box .dc-re { color: #e05555; }
    .deriv-box .dc-gr { color: #55c878; }
    .deriv-box .dc-ye { color: #ffe566; }

    .btn {
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #7c6af7, #5b4de0);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }

    .hint { font-size: 11px; color: #444; text-align: center; line-height: 1.6; }

    @media (max-width: 700px) {
      body { flex-direction: column; overflow-y: auto; height: auto; }
      #canvas-wrap { height: 52vh; min-height: 52vh; flex: none; }
      #panel { width: 100%; border-left: none; border-top: 1px solid rgba(255,255,255,0.07); }
    }
  </style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="label-wrap"></div>
</div>

<div id="panel">
  <div>
    <h1>a<sup>3</sup> − b<sup>3</sup></h1>
    <div class="subtitle">Геометрическое объяснение формулы</div>
  </div>

  <div class="formula-box">
    <div class="formula-main">a³ − b³ =</div>
    <div class="formula-parts">
      <span style="color:#4d9de0">a²</span>(a−b)
      + <span style="color:#e05555">ab</span>(a−b)
      + <span style="color:#55c878">b²</span>(a−b)
    </div>
    <div class="formula-parts" style="margin-top:4px;color:#777">
      = (a−b)(<span style="color:#4d9de0">a²</span> + <span style="color:#e05555">ab</span> + <span style="color:#55c878">b²</span>)
    </div>
    <div class="formula-numeric" id="formula-numeric"></div>
  </div>

  <div>
    <div class="section-label">Параметры</div>
    <div class="slider-row">
      <span class="slider-name">a</span>
      <input type="range" id="slider-a" min="2" max="6" value="4" step="0.5">
      <span class="slider-val" id="val-a">4</span>
    </div>
    <div class="slider-row">
      <span class="slider-name">b</span>
      <input type="range" id="slider-b" min="0.5" max="3.5" value="1.5" step="0.5">
      <span class="slider-val" id="val-b">1.5</span>
    </div>
    <div class="constraint-hint" id="chint"></div>
  </div>

  <div>
    <div class="section-label">Фигуры</div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#4d9de0"></div>
      <span class="legend-term" style="color:#4d9de0">a²(a−b)</span>
      <span class="legend-val" id="leg-a2c"></span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#e05555"></div>
      <span class="legend-term" style="color:#e05555">ab(a−b)</span>
      <span class="legend-val" id="leg-abc"></span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#55c878"></div>
      <span class="legend-term" style="color:#55c878">b²(a−b)</span>
      <span class="legend-val" id="leg-b2c"></span>
    </div>
    <div class="legend-item" style="opacity:0.65">
      <div class="legend-dot ghost"></div>
      <span class="legend-term" style="color:#ffe566">−b³</span>
      <span class="legend-val" id="leg-b3"></span>
    </div>
    <div style="border-top:1px solid rgba(255,255,255,0.07);margin:6px 0 8px;"></div>
    <div style="font-size:13px;color:#888;text-align:right">
      Итого: <span id="leg-total" style="color:#fff;font-weight:700"></span>
    </div>
  </div>

  <div class="deriv-box">
    <div>(a−b)(a²+ab+b²) =</div>
    <div class="hl" style="padding-left:8px">
      = <span class="dc-bl">a³+a²b+ab²</span>
        − <span class="dc-re">a²b+ab²</span>
        − <span class="dc-ye">b³</span>
    </div>
    <div style="padding-left:8px">= <span class="hl">a³ − b³</span> ✓</div>
  </div>

  <button class="btn" id="btn-explode">Разобрать</button>

  <div class="hint">
    Вращение — тащить / пальцем<br>
    Масштаб — колесо / щипок
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls }              from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ─── Renderer ────────────────────────────────────────────────────────────────
const canvasEl  = document.getElementById('canvas');
const labelWrap = document.getElementById('label-wrap');

const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const labelRenderer = new CSS2DRenderer({ element: labelWrap });

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d1a);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 200);

const controls = new OrbitControls(camera, canvasEl);
controls.enableDamping   = true;
controls.dampingFactor   = 0.06;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.7;
controls.addEventListener('start', () => { controls.autoRotate = false; });

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const sun = new THREE.DirectionalLight(0xfff4e0, 1.1);
sun.position.set(10, 16, 10);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x8899ff, 0.35);
fill.position.set(-8, -5, -8);
scene.add(fill);

// ─── Piece definitions ────────────────────────────────────────────────────────
// a-cube spans [-a/2, a/2] on all axes. b³ ghost is in (+,+,+) corner.
// M = a/2 − b   (boundary between the b-zone and the (a-b)-zone on positive side)
//
// Piece A (blue):  x∈[−a/2, M], all y,z   → size (a−b)×a×a = a²(a−b)
//   center: (−b/2, 0, 0)       explode: −x
//
// Piece B (red):   x∈[M, a/2], y∈[−a/2, M], all z   → size b×(a−b)×a = ab(a−b)
//   center: (a/2−b/2, −b/2, 0)   explode: −y
//
// Piece C (green): x∈[M, a/2], y∈[M, a/2], z∈[−a/2, M]  → size b×b×(a−b) = b²(a−b)
//   center: (a/2−b/2, a/2−b/2, −b/2)   explode: −z
//
// Ghost b³ (yellow): x,y,z∈[M, a/2]  center: (a/2−b/2, a/2−b/2, a/2−b/2)  explode: +diag

const DEFS = [
  {
    label: 'a²(a−b)', color: 0x4d9de0, hex: '#4d9de0',
    center: (a,b) => [-b/2,     0,       0      ],
    size:   (a,b) => [a-b,      a,       a      ],
    dir: [-1, 0, 0],
  },
  {
    label: 'ab(a−b)', color: 0xe05555, hex: '#e05555',
    center: (a,b) => [a/2-b/2,  -b/2,    0      ],
    size:   (a,b) => [b,         a-b,     a      ],
    dir: [0, -1, 0],
  },
  {
    label: 'b²(a−b)', color: 0x55c878, hex: '#55c878',
    center: (a,b) => [a/2-b/2,  a/2-b/2, -b/2   ],
    size:   (a,b) => [b,         b,        a-b   ],
    dir: [0, 0, -1],
  },
];
const N3 = 1 / Math.sqrt(3); // ghost explode direction norm

// ─── Scene objects ────────────────────────────────────────────────────────────
const GAP = 0.03;
let meshes=[], edgeSets=[], pieceLabels=[];
let ghostMesh=null, ghostEdge=null, ghostLabel=null;
let outerWire=null;
let dimGroup=null, dimLabels=[], dimMat=null;
let curA=4, curB=1.5;
let explodeProgress=0, explodeTarget=0, isExploded=false;

function buildScene(a, b) {
  // Cleanup
  meshes.forEach(m=>scene.remove(m));
  edgeSets.forEach(e=>scene.remove(e));
  pieceLabels.forEach(lb=>lb.element.remove());
  if(ghostMesh)  scene.remove(ghostMesh);
  if(ghostEdge)  scene.remove(ghostEdge);
  if(ghostLabel) ghostLabel.element.remove();
  if(outerWire)  scene.remove(outerWire);
  if(dimGroup)   {
    [...dimGroup.children].forEach(c=>{ if(c.element) c.element.remove(); });
    scene.remove(dimGroup);
  }
  meshes=[]; edgeSets=[]; pieceLabels=[];
  ghostMesh=ghostEdge=ghostLabel=outerWire=dimGroup=null;
  dimLabels=[]; dimMat=null;

  // Outer wireframe (a-cube)
  const owGeo = new THREE.BoxGeometry(a,a,a);
  outerWire = new THREE.LineSegments(
    new THREE.EdgesGeometry(owGeo),
    new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.13})
  );
  scene.add(outerWire);

  // Ghost b³ in (+,+,+) corner
  const gc = a/2 - b/2;
  const ghostGeo = new THREE.BoxGeometry(b-GAP, b-GAP, b-GAP);
  ghostMesh = new THREE.Mesh(ghostGeo, new THREE.MeshPhongMaterial({
    color: 0xffe566, transparent: true, opacity: 0.14, depthWrite: false,
  }));
  ghostMesh.position.set(gc, gc, gc);
  scene.add(ghostMesh);

  ghostEdge = new THREE.LineSegments(
    new THREE.EdgesGeometry(ghostGeo),
    new THREE.LineBasicMaterial({color:0xffe566,transparent:true,opacity:0.45})
  );
  ghostEdge.position.set(gc, gc, gc);
  scene.add(ghostEdge);

  const gDiv = document.createElement('div');
  gDiv.className='piece-label'; gDiv.textContent='−b³';
  gDiv.style.color='#ffe566'; gDiv.style.opacity='0';
  const gLabelObj = new CSS2DObject(gDiv);
  gLabelObj.position.set(0, 0, 0);
  ghostMesh.add(gLabelObj);
  ghostLabel = gLabelObj;

  // 3 solid pieces
  DEFS.forEach(def => {
    const [sx,sy,sz] = def.size(a,b);
    const geo = new THREE.BoxGeometry(sx-GAP, sy-GAP, sz-GAP);
    const mat = new THREE.MeshPhongMaterial({
      color: def.color, transparent: true, opacity: 0.82, shininess: 60,
    });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh); meshes.push(mesh);

    const eMat = new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.28});
    const edge = new THREE.LineSegments(new THREE.EdgesGeometry(geo), eMat);
    scene.add(edge); edgeSets.push(edge);

    const div = document.createElement('div');
    div.className='piece-label'; div.textContent=def.label;
    div.style.color=def.hex; div.style.opacity='0';
    const lObj = new CSS2DObject(div);
    lObj.position.set(0, 0, 0);
    mesh.add(lObj); pieceLabels.push(lObj);
  });

  // Dimension lines
  buildDimensions(a, b);

  // Camera
  const dist = a * 2.4;
  camera.position.set(dist, dist*0.75, dist);
  controls.target.set(0, 0, 0);
  controls.update();

  updatePanel(a, b);
}

// ─── Dimension lines ──────────────────────────────────────────────────────────
function buildDimensions(a, b) {
  dimGroup = new THREE.Group();
  scene.add(dimGroup);

  const OFF=0.48, TICK=0.18, LOFF=0.44;
  const AC='#ffe566', BC='#66ddee', TC='#d0d0d0';
  dimMat = new THREE.LineBasicMaterial({color:0x778899,transparent:true,opacity:0.6});

  // M = a/2 - b (split point: from -a/2 to M is (a-b) wide, from M to a/2 is b wide)
  const M = a/2 - b;

  function seg(p1, p2) {
    const g = new THREE.BufferGeometry().setFromPoints(
      [new THREE.Vector3(...p1), new THREE.Vector3(...p2)]
    );
    dimGroup.add(new THREE.Line(g, dimMat));
  }
  function dlabel(text, px, py, pz, color) {
    const el = document.createElement('div');
    el.className='dim-label'; el.textContent=text; el.style.color=color;
    const obj = new CSS2DObject(el);
    obj.position.set(px, py, pz);
    dimGroup.add(obj); dimLabels.push(obj);
  }

  const yB = -a/2-OFF, zF = a/2, xL = -a/2-OFF, xR = a/2;
  const midC = -b/2;       // midpoint of (a-b) span: from -a/2 to M, mid = (-a/2+M)/2 = -b/2
  const midB  = a/2-b/2;  // midpoint of b span: from M to a/2, mid = (M+a/2)/2 = a/2-b/2

  // X axis (below front face)
  seg([-a/2,yB,zF],[a/2,yB,zF]);
  seg([-a/2,yB-TICK,zF],[-a/2,yB+TICK,zF]);
  seg([M,yB-TICK,zF],[M,yB+TICK,zF]);
  seg([a/2,yB-TICK,zF],[a/2,yB+TICK,zF]);
  dlabel('a−b', midC, yB-LOFF, zF, AC);
  dlabel('b',   midB, yB-LOFF, zF, BC);
  dlabel('a',   0,    yB-LOFF-0.35, zF, TC);

  // Y axis (left of front face)
  seg([xL,-a/2,zF],[xL,a/2,zF]);
  seg([xL-TICK,-a/2,zF],[xL+TICK,-a/2,zF]);
  seg([xL-TICK,M,zF],[xL+TICK,M,zF]);
  seg([xL-TICK,a/2,zF],[xL+TICK,a/2,zF]);
  dlabel('a−b', xL-LOFF, midC, zF, AC);
  dlabel('b',   xL-LOFF, midB, zF, BC);
  dlabel('a',   xL-LOFF-0.35, 0, zF, TC);

  // Z axis (right-bottom)
  seg([xR,yB,-a/2],[xR,yB,a/2]);
  seg([xR,yB-TICK,-a/2],[xR,yB+TICK,-a/2]);
  seg([xR,yB-TICK,M],[xR,yB+TICK,M]);
  seg([xR,yB-TICK,a/2],[xR,yB+TICK,a/2]);
  dlabel('a−b', xR, yB-LOFF, midC, AC);
  dlabel('b',   xR, yB-LOFF, midB, BC);
  dlabel('a',   xR, yB-LOFF-0.35, 0, TC);
}

// ─── Positions ───────────────────────────────────────────────────────────────
function applyPositions(a, b, p) {
  const DIST = a * 1.15;

  DEFS.forEach((def, i) => {
    const [cx,cy,cz] = def.center(a,b);
    const [dx,dy,dz] = def.dir;
    meshes[i].position.set(cx+dx*DIST*p, cy+dy*DIST*p, cz+dz*DIST*p);
    edgeSets[i].position.copy(meshes[i].position);
    pieceLabels[i].element.style.opacity = Math.min(p*1.8, 1).toFixed(2);
  });

  // Ghost b³ moves in (+1,+1,+1)/√3 direction
  const gc = a/2-b/2;
  ghostMesh.position.set(gc+N3*DIST*p, gc+N3*DIST*p, gc+N3*DIST*p);
  ghostEdge.position.copy(ghostMesh.position);
  ghostLabel.element.style.opacity = Math.min(p*1.8, 1).toFixed(2);

  // Outer wire fades out
  if(outerWire) outerWire.material.opacity = 0.13*(1-p);

  // Dim lines fade out
  const dimOp = Math.max(0, 1-p*2.5);
  if(dimMat) dimMat.opacity = 0.6*dimOp;
  dimLabels.forEach(lb => { lb.element.style.opacity = String(dimOp.toFixed(2)); });
}

// ─── Panel ───────────────────────────────────────────────────────────────────
function fmt(n) { return Number.isInteger(n) ? String(n) : n.toFixed(2); }

function updatePanel(a, b) {
  const c  = a - b;
  const a2c = a*a*c, abc = a*b*c, b2c = b*b*c;
  const b3  = b*b*b;
  const tot = a2c + abc + b2c;

  document.getElementById('formula-numeric').textContent =
    `${fmt(a2c)} + ${fmt(abc)} + ${fmt(b2c)} = ${fmt(tot)}`;
  document.getElementById('leg-a2c').textContent = `= ${fmt(a2c)}`;
  document.getElementById('leg-abc').textContent  = `= ${fmt(abc)}`;
  document.getElementById('leg-b2c').textContent = `= ${fmt(b2c)}`;
  document.getElementById('leg-b3').textContent  = `= −${fmt(b3)}`;
  document.getElementById('leg-total').textContent = fmt(tot);
  document.getElementById('chint').textContent = b >= a ? 'b должно быть меньше a' : '';
}

// ─── Controls ────────────────────────────────────────────────────────────────
function resetExplode() {
  isExploded=false; explodeTarget=0;
  document.getElementById('btn-explode').textContent='Разобрать';
}

document.getElementById('slider-a').addEventListener('input', e => {
  curA = parseFloat(e.target.value);
  document.getElementById('val-a').textContent = curA;
  if(curB >= curA) { curB = curA - 0.5; document.getElementById('slider-b').value = curB; document.getElementById('val-b').textContent = curB; }
  resetExplode(); buildScene(curA, curB);
});

document.getElementById('slider-b').addEventListener('input', e => {
  curB = parseFloat(e.target.value);
  document.getElementById('val-b').textContent = curB;
  if(curB >= curA) { curB = curA - 0.5; document.getElementById('slider-b').value = curB; document.getElementById('val-b').textContent = curB; }
  resetExplode(); buildScene(curA, curB);
});

document.getElementById('btn-explode').addEventListener('click', () => {
  isExploded = !isExploded;
  explodeTarget = isExploded ? 1 : 0;
  document.getElementById('btn-explode').textContent = isExploded ? 'Собрать' : 'Разобрать';
  controls.autoRotate = false;
});

// ─── Resize ──────────────────────────────────────────────────────────────────
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  renderer.setSize(wrap.clientWidth, wrap.clientHeight, false);
  labelRenderer.setSize(wrap.clientWidth, wrap.clientHeight);
  camera.aspect = wrap.clientWidth / wrap.clientHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ─── Animate ─────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  explodeProgress += (explodeTarget - explodeProgress) * 0.055;
  applyPositions(curA, curB, explodeProgress);
  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
buildScene(curA, curB);
animate();
</script>
</body>
</html>
