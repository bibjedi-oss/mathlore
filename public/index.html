<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathLore</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div class="header-left">
        <div class="logo">🔭 MathLore</div>
        <div class="subtitle">Математика через историю</div>
      </div>
      <button id="ttsToggle" class="tts-btn" title="Включить голос">🔇</button>
    </header>

    <div class="chat" id="chat">
      <div class="welcome">
        <p>Введи тему или параграф из учебника — и мы узнаем о ней через настоящую историю</p>
        <input
          type="text"
          id="topicInput"
          class="topic-input"
          placeholder="Например: дроби, теорема Пифагора, объём тела..."
          autocomplete="off"
        />
        <button id="startBtn" class="start-btn">Начать историю 🚀</button>
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="input"
        placeholder="Напиши что-нибудь..."
        disabled
        autocomplete="off"
      />
      <input type="file" id="photoInput" accept="image/*" style="display:none" />
      <button id="photoBtn" disabled title="Отправить фото">📷</button>
      <button id="drawBtn" disabled title="Нарисовать ответ">✏️</button>
      <button id="micBtn" disabled title="Говори">🎤</button>
      <button id="sendBtn" disabled>→</button>
    </div>

    <div id="drawModal" class="draw-modal hidden">
      <div class="draw-panel">
        <div class="draw-header">
          <span>Нарисуй свой ответ</span>
          <button id="clearBtn">Очистить</button>
        </div>
        <canvas id="drawCanvas"></canvas>
        <div class="draw-footer">
          <button id="cancelDrawBtn">Отмена</button>
          <button id="sendDrawBtn">Отправить →</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
