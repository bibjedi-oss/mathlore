<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathLore</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- ── Авторизация ── -->
    <div id="authScreen" class="screen hidden">
      <div class="auth-wrap">
        <div class="auth-logo">🔭 MathLore</div>

        <!-- Ребёнок (по умолчанию) -->
        <div id="childAuthPanel" class="auth-panel">
          <input id="childName" class="auth-input" type="text" placeholder="Твоё имя" />
          <input id="childPassword" class="auth-input" type="password" placeholder="Пароль" autocomplete="current-password" />
          <div id="childAuthError" class="auth-error hidden"></div>
          <button id="childAuthBtn" class="auth-btn">Войти</button>
        </div>

        <!-- Родитель (скрыт) -->
        <div id="parentAuthPanel" class="auth-panel hidden">
          <div class="auth-mode-tabs">
            <button class="auth-mode active" data-mode="login">Войти</button>
            <button class="auth-mode" data-mode="register">Зарегистрироваться</button>
          </div>
          <input id="parentName" class="auth-input hidden" type="text" placeholder="Ваше имя" />
          <input id="parentEmail" class="auth-input" type="email" placeholder="Email" autocomplete="email" />
          <input id="parentPassword" class="auth-input" type="password" placeholder="Пароль" autocomplete="current-password" />
          <div id="parentAuthError" class="auth-error hidden"></div>
          <button id="parentAuthBtn" class="auth-btn">Войти</button>
        </div>

        <button id="parentToggleBtn" class="auth-parent-link">Вход для родителей</button>
      </div>
    </div>

    <!-- ── Кабинет родителя ── -->
    <div id="dashboardScreen" class="screen hidden">
      <div class="dash-header">
        <div class="dash-title">Кабинет родителя</div>
        <button id="dashLogoutBtn" class="dash-logout">Выйти</button>
      </div>
      <div class="dash-body">
        <div id="dashChildren" class="dash-children"></div>
      </div>
    </div>

    <!-- ── Приветствие (ребёнок) ── -->
    <header id="mainHeader">
      <div class="header-left">
        <button id="backBtn" class="back-btn hidden">←</button>
        <div class="logo">🔭 MathLore</div>
      </div>
      <div class="header-right">
        <button id="doneBtn" class="done-btn hidden">✓ Готово</button>
        <div id="ttsLoading" class="tts-loading hidden"></div>
        <button id="ttsToggle" class="tts-btn active" title="Выключить голос">🔊</button>
        <button id="logoutBtn" class="logout-icon" title="Выйти">⏏</button>
      </div>
    </header>

    <!-- ── Лобби ── -->
    <div id="lobbyScreen" class="screen hidden"></div>

    <!-- ── Чат ── -->
    <div id="chatScreen" class="screen hidden">
      <div class="topic-banner" id="topicBanner"></div>
      <div class="phase-bar hidden" id="phaseBar">
        <span id="phaseLabel"></span>
      </div>
      <div class="chat" id="chat"></div>
      <div class="input-area">
        <input type="text" id="input" placeholder="Напиши что-нибудь..." disabled autocomplete="off" />
        <input type="file" id="photoInput" accept="image/*" style="display:none" />
        <button id="photoBtn" disabled title="Отправить фото">📷</button>
        <button id="micBtn" disabled title="Говори">🎤</button>
        <button id="sendBtn" disabled>→</button>
      </div>
    </div>

  </div>

  <div id="welcomeModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-emoji" id="welcomeModalEmoji"></div>
      <div class="modal-text" id="welcomeModalText"></div>
      <button class="auth-btn" id="welcomeModalBtn"></button>
    </div>
  </div>

  <script src="curriculum.js"></script>
  <script src="app.js"></script>
</body>
</html>
